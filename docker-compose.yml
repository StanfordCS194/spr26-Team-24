services:
  db:
    image: postgres:16
    container_name: nexa-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexa
      POSTGRES_PASSWORD: nexa_dev_password
      POSTGRES_DB: nexa
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
